interface:
  display_name: "Resumable Workflow Guard"
  short_description: "Protect long-running or interruption-prone engineering work with explicit checkpoints, resume files, and handoff notes. Use when a task may span multiple turns or sessions, exceed about 30 minutes, touch multiple workflow stages, require repeated verification, approach context limits, resume after interruption/compaction, or when the user says continue, resume, checkpoint, long task, handoff, 中断, 继续, 续跑, 检查点, 长任务, or 交接."
  default_prompt: "Use $df-resumable-workflow-guard to decide whether this task needs checkpointed execution, create or update a resume file, and continue from the next incomplete step instead of restarting."
