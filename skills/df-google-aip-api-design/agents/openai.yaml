interface:
  display_name: "Google Aip Api Design"
  short_description: "Design, review, and refactor resource-oriented HTTP, REST, gRPC transcoding, protobuf, and OpenAPI APIs using Google API Improvement Proposals (AIP). Use when Codex needs to create or critique API endpoints, REST URI version prefixes, resource names, standard methods, custom methods, pagination, filtering, field masks, errors, long-running operations, protobuf service definitions, or api-linter setup against Google AIP guidance."
  default_prompt: "Use $df-google-aip-api-design to design or review an HTTP API against Google AIP guidance."
